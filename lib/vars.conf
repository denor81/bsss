# Define readonly variables only if not already defined (to avoid redefining)
[[ -z "${UTIL_NAME:-}" ]] && readonly UTIL_NAME="bsss"

[[ -z "${UTILS_DIR:-}" ]] && readonly UTILS_DIR="utils"
[[ -z "${MODULES_DIR:-}" ]] && readonly MODULES_DIR="modules"
[[ -z "${MODULES_MASK:-}" ]] && readonly MODULES_MASK='[0-9][0-9]*.sh' # nullglob mask
[[ -z "${MODULE_TYPE_MODIFY:-}" ]] && readonly MODULE_TYPE_MODIFY="modify"
[[ -z "${MODULE_TYPE_CHECK:-}" ]] && readonly MODULE_TYPE_CHECK="check"

[[ -z "${UNINSTALL_PATHS:-}" ]] && readonly UNINSTALL_PATHS=".uninstall_paths"

[[ -z "${OS_RELEASE_FILE_PATH:-}" ]] && readonly OS_RELEASE_FILE_PATH="/etc/os-release"
[[ -z "${ALLOWED_SYS:-}" ]] && readonly ALLOWED_SYS="ubuntu"

[[ -z "${REBOOT_REQUIRED_FILE_PATH:-}" ]] && readonly REBOOT_REQUIRED_FILE_PATH="/var/run/reboot-required"

[[ -z "${DEFAULT_SSH_PORT:-}" ]] && readonly DEFAULT_SSH_PORT=22
[[ -z "${SSH_CONFIG_FILE:-}" ]] && readonly SSH_CONFIG_FILE="/etc/ssh/sshd_config"
[[ -z "${SSH_CONFIG_DIR:-}" ]] && readonly SSH_CONFIG_DIR="/etc/ssh"
[[ -z "${SSH_CONFIGD_DIR:-}" ]] && readonly SSH_CONFIGD_DIR="/etc/ssh/sshd_config.d"
[[ -z "${BSSS_SSH_CONFIG_FILE_NAME:-}" ]] && readonly BSSS_SSH_CONFIG_FILE_NAME="40-bsss-ssh-port.conf"
[[ -z "${BSSS_SSH_CONFIG_FILE_MASK:-}" ]] && readonly BSSS_SSH_CONFIG_FILE_MASK='*bsss-ssh-port.conf' # nullglob mask
[[ -z "${SSH_CONFIG_FILE_MASK:-}" ]] && readonly SSH_CONFIG_FILE_MASK='*.conf' # nullglob mask
[[ -z "${BSSS_MARKER_COMMENT:-}" ]] && readonly BSSS_MARKER_COMMENT="Generated by ${UTIL_NAME^^}"
[[ -z "${ROLLBACK_TIMER_SECONDS:-}" ]] && readonly ROLLBACK_TIMER_SECONDS=4
[[ -z "${ROLLBACK_MODULE_NAME:-}" ]] && readonly ROLLBACK_MODULE_NAME="rollback.sh"
[[ -z "${SSH_PORT_CHECK_TIMEOUT:-}" ]] && readonly SSH_PORT_CHECK_TIMEOUT=2

# ============================================================================
# TEST MODE CONFIGURATION
# ============================================================================

# Test mode flag (default: false)
# When true: enables non-interactive mode, file logging
# Note: Using export instead of readonly to allow test scenarios to override
export TEST_MODE="${TEST_MODE:-false}"

# Log mode: terminal | file | both (default: terminal)
# Note: Using export instead of readonly to allow test scenarios to override
export LOG_MODE="${LOG_MODE:-terminal}"

# Log file path (only used if LOG_MODE is file or both)
# Default: /tmp/bsss-tests/bsss-<timestamp>.log
export LOG_FILE="${LOG_FILE:-}"

# Test log directory (for test scenarios)
export TEST_LOG_DIR="${TEST_LOG_DIR:-/tmp/bsss-tests/logs}"

# Test timeout in seconds (default: 30)
export TEST_TIMEOUT="${TEST_TIMEOUT:-30}"

# Test scenario name (for log identification)
export TEST_SCENARIO="${TEST_SCENARIO:-}"

# Test fail confirmation pattern (optional)
# If set, prompts containing this pattern will return failure in test mode
# Used for testing error paths
export TEST_FAIL_CONFIRMATION="${TEST_FAIL_CONFIRMATION:-}"

# Test module selection (export, not readonly, to allow test overrides)
# Module filename to select in test mode (e.g., "04-ssh-port-modify.sh")
# When set, the main menu is bypassed and the specified module is executed directly
export TEST_MODULE="${TEST_MODULE:-}"
