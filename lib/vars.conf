readonly UTIL_NAME="bsss"

readonly UTILS_DIR="utils"
readonly MODULES_DIR="modules"
readonly MODULES_MASK='[0-9][0-9]*.sh' # nullglob mask
readonly MODULE_TYPE_MODIFY="modify"
readonly MODULE_TYPE_CHECK="check"

readonly UNINSTALL_PATHS=".uninstall_paths"

readonly OS_RELEASE_FILE_PATH="/etc/os-release"
readonly ALLOWED_SYS="ubuntu"

readonly REBOOT_REQUIRED_FILE_PATH="/var/run/reboot-required"

readonly DEFAULT_SSH_PORT=22
readonly SSH_CONFIG_FILE="/etc/ssh/sshd_config"
readonly SSH_CONFIG_DIR="/etc/ssh"
readonly SSH_CONFIGD_DIR="/etc/ssh/sshd_config.d"
readonly BSSS_SSH_CONFIG_FILE_NAME="40-bsss-ssh-port.conf"
readonly BSSS_SSH_CONFIG_FILE_MASK='*bsss-ssh-port.conf' # nullglob mask
readonly SSH_CONFIG_FILE_MASK='*.conf' # nullglob mask
readonly BSSS_MARKER_COMMENT="Generated by ${UTIL_NAME^^}"
readonly ROLLBACK_TIMER_SECONDS=4
readonly ROLLBACK_MODULE_NAME="rollback.sh"
readonly SSH_PORT_CHECK_TIMEOUT=2

# ============================================================================
# TEST MODE CONFIGURATION
# ============================================================================

# Test mode flag (default: false)
# When true: enables non-interactive mode, file logging
# Note: Using export instead of readonly to allow test scenarios to override
export TEST_MODE="${TEST_MODE:-false}"

# Log mode: terminal | file | both (default: terminal)
# Note: Using export instead of readonly to allow test scenarios to override
export LOG_MODE="${LOG_MODE:-terminal}"

# Log file path (only used if LOG_MODE is file or both)
# Default: /tmp/bsss-tests/bsss-<timestamp>.log
export LOG_FILE="${LOG_FILE:-}"

# Test log directory (for test scenarios)
export TEST_LOG_DIR="${TEST_LOG_DIR:-/tmp/bsss-tests/logs}"

# Test timeout in seconds (default: 30)
export TEST_TIMEOUT="${TEST_TIMEOUT:-30}"

# Test scenario name (for log identification)
export TEST_SCENARIO="${TEST_SCENARIO:-}"

# Test fail confirmation pattern (optional)
# If set, prompts containing this pattern will return failure in test mode
# Used for testing error paths
export TEST_FAIL_CONFIRMATION="${TEST_FAIL_CONFIRMATION:-}"
